name: Deploy

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  test:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked --all-features
  cargo:
    needs:
      - test
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify release tag matches Cargo.toml
        if: github.event_name == 'release'
        run: |
          crate_version=$(grep '^version = ' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          release_tag="${{ github.event.release.tag_name }}"

          if [ "v${crate_version}" != "${release_tag}" ]; then
            echo "Release tag ${release_tag} does not match Cargo.toml version v${crate_version}"
            exit 1
          fi
      - run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
